services:
  backend:
    build: ./backend
    environment:
      - SOURCES_DIR=/data/sources
    volumes:
      - ./sources:/data/sources
      - ./backend/.env:/app/.env:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
